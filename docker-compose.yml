services:
  mysql:
    image: mysql:8.4
    container_name: ai-service-navigator-mysql
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    container_name: ai-service-navigator-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLIC_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-service-navigator-api
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      DATABASE_URL: ${DATABASE_URL:-}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DIFY_API_BASE_URL: ${DIFY_API_BASE_URL}
      DIFY_API_KEY: ${DIFY_API_KEY}
      DIFY_INTENT_API_KEY: ${DIFY_INTENT_API_KEY}
      DIFY_TIMEOUT_MS: ${DIFY_TIMEOUT_MS:-5000}
      MINIMAX_API_BASE_URL: ${MINIMAX_API_BASE_URL:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-minimax-2.5}
      MINIMAX_TIMEOUT_MS: ${MINIMAX_TIMEOUT_MS:-3000}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      APP_TIMEZONE_OFFSET_MINUTES: ${APP_TIMEZONE_OFFSET_MINUTES:-480}
      OAUTH_AUTH_SERVER: ${OAUTH_AUTH_SERVER}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
      OAUTH_SCOPE: ${OAUTH_SCOPE}
      PORT: 3000
    ports:
      - "${API_PUBLIC_PORT:-3000}:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${WEB_API_BASE_URL:-}
    container_name: ai-service-navigator-web
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      - api
    volumes:
      - ./static/service-assets:/usr/share/nginx/html/service-assets:ro
    ports:
      - "${WEB_PUBLIC_PORT:-8080}:80"

volumes:
  mysql_data:
